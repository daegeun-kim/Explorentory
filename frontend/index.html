<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Explorentory</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://unpkg.com/maplibre-gl@^5.6.1/dist/maplibre-gl.css" rel="stylesheet" />
</head>
<body>
  <div id="main-container">
    <div id="single-map-container">
        <div id="map"></div>
    </div>
    <div id="chart">
      <div id="chart-placeholder">
        <span id="title-placeholder">Explorentory</span>
      </div>
      <div id="chart1"></div>
    </div>
  </div>
  <div id="input-output">
    <div id="message">
      <div id="button-container">
        <button id="reset">Reset</button>
      </div>
      <div id="output-message">
        <div id="output-placeholder">
          <div id="main-placeholder">Set your<br>preferences<br><br>to find<br>your perfect<br>rental</div>
        </div>
      </div>
      <form id="query-form">
        <textarea id="query-input"></textarea>
        <button id="query" type="submit">Query</button>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
  <script src="assets/js/map.js"></script>
  <script src="assets/js/preferences.js"></script>
  <script src="assets/js/neighborhood.js"></script>
  <script src="assets/js/rating.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
