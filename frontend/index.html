<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Explorentory</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="main-container">
    <div id="single-map-container">
        <div id="map"></div>
        <div id="choropleth-mode-buttons"></div>
        <div id="map-view-buttons">
          <button id="btn-pitch-toggle">3D</button>
          <button id="btn-north-reset">&#8679;N</button>
        </div>
    </div>
    <div id="chart-resize-handle"></div>
    <div id="chart">
      <div id="chart-placeholder">
        <span id="title-placeholder">Explorentory</span>
      </div>
      <div id="chart-charts-row">
        <div id="chart1">
          <div id="chart1-title" class="chart-title-bar"></div>
          <div id="chart1-canvas-wrap" class="chart-canvas-wrap"></div>
        </div>
        <div id="chart2">
          <div id="chart2-title" class="chart-title-bar"></div>
          <div id="chart2-canvas-wrap" class="chart-canvas-wrap"></div>
        </div>
      </div>
    </div>
  </div>
  <div id="sidebar-resize-handle"></div>
  <div id="input-output">
    <div id="message">
      <div id="button-container">
        <button id="reset">Reset</button>
        <button id="color-invert">&#9680;</button>
      </div>
      <div id="output-message">
        <div id="output-placeholder">
          <div id="main-placeholder">Set your<br>preferences<br><br>to find<br>your perfect<br>rental</div>
        </div>
      </div>
      <form id="query-form">
        <textarea id="query-input"></textarea>
        <button id="query" type="submit">Query</button>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
  <script src="assets/js/map.js"></script>
  <script src="assets/js/charts.js"></script>
  <script src="assets/js/preferences.js"></script>
  <script src="assets/js/neighborhood.js"></script>
  <script src="assets/js/rating.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
